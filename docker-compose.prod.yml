services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint:
      - sh
      - -c
      - >
        set -a;
        . /run/secrets/pulsemarket.env;
        set +a;
        exec docker-entrypoint.sh postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.env:/run/secrets/pulsemarket.env:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          set -a;
          . /run/secrets/pulsemarket.env;
          set +a;
          pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./.env:/run/secrets/pulsemarket.env:ro
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          set -a;
          . /run/secrets/pulsemarket.env;
          set +a;
          python -c 'import os, urllib.request; urllib.request.urlopen("http://127.0.0.1:%s/health" % os.getenv("APP_PORT", "8080"), timeout=5).read()'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:

